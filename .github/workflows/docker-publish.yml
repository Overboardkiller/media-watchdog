name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (dev branch)
        if: github.ref_name == 'dev'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: overboardkiller/media-watchdog:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (main branch)
        if: github.ref_name == 'main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            overboardkiller/media-watchdog:latest
            overboardkiller/media-watchdog:v${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract changelog for this version
        if: github.ref_name == 'main'
        id: changelog
        run: |
          VERSION=$(cat VERSION)
          # Extract section between this version header and the next one
          NOTES=$(awk "/## \[v${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Escape for GitHub Actions multiline output
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.ref_name == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
